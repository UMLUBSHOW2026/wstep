<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala rezerwacji PRO</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<style>
body { font-family: Arial; margin:0; padding:0; background:#f4f4f4; }

#adminListModal {
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
    z-index:300;
}

/* top bar */
.top-bar {
    margin: 20px 0;
    display: flex;
    justify-content: center;
    gap: 5px;
    flex-wrap: wrap;
}

input {
    padding: 8px 12px;
    border-radius: 20px;
    border: 1px solid #ccc;
    outline: none;
    transition: 0.2s;
}

input:focus {
    border-color: #4caf50;
    box-shadow: 0 0 8px rgba(76,175,80,0.5);
}

.top-bar button {
    border-radius: 20px;
    background:#4caf50;
    color:white;
    border:none;
}

/* scena */
.stage {
    position: relative;
    width: min(800px, 95vw);
    height: 40px;
    background-color: #d2a679;
    margin: 10px auto 20px auto;
}

/* scroll poziomy */
#hall-container {
    width: 100%;
    overflow-x: auto;
    display: flex;
    justify-content: center;
    padding-left: 40px;
}

#hall {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    min-width: max-content;
}

.row {
    display: flex;
    justify-content: center;
    margin: 4px 0;
}

/* numer rzędu */
.rowLabel {
    width: 40px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
    color:#333;
}

/* fotele */
.seat {
    width: min(36px,4vw);
    aspect-ratio: 1 / 1.2;
    margin: min(3px,0.5vw);
    background: linear-gradient(to top, #3c763d 0%, #5cb85c 60%, #4cae4c 100%);
    border-radius: 8px;
    border-bottom: 4px solid #2e6d2f;
    color: white;
    font-size: min(12px,1.5vw);
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
}

.seat:hover { transform: scale(1.1); }
.selected { background: orange; }
.occupied { background: gray; cursor: not-allowed; }
.highlight { outline: 3px solid yellow; }

.gap { width: min(15px,2vw); }
.big-gap { height: min(25px,3vw); }

#selectedCount, #freeCount, #occupiedCount {
    margin-top: 10px;
    text-align: center;
    font-weight: bold;
}

#reserveBtn {
    display: block;
    margin: 20px auto;
    padding: 12px 25px;
    font-size: 16px;
}

/* modal */
#modal, #adminModal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    justify-content: center;
    align-items: center;
    z-index: 200;
}

.modalContent {
    background: #f9f9f9;
    padding: 25px 30px;
    border-radius: 15px;
    width: 90%;
    max-width: 450px;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.modalContent input {
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.modalContent button {
    padding: 12px;
    border: none;
    border-radius: 8px;
}

.cancel-btn { background:#ccc; }
.confirm-btn { background:#4caf50; color:white; }
</style>
</head>

<body>

<div class="top-bar">
    <button id="adminPanelBtn" style="position:fixed; top:10px; right:10px;">
⚙️ ADMIN
</button>
    🔍 <input type="text" id="search" placeholder="Szukaj osoby">
    <button onclick="searchPerson()">Szukaj</button>
</div>

<div class="stage"></div>

<div id="hall-container">
    <div id="hall"></div>
</div>

<div id="selectedCount">Wybrane miejsca: 0</div>
<div id="freeCount">Wolne miejsca: 0</div>
<div id="occupiedCount">Zajęte miejsca: 0</div>

<button id="reserveBtn">ZAREZERWUJ</button>

<!-- MODALE -->
<div id="modal">
    <div class="modalContent">
        <h3>Imię i nazwisko</h3>
        <input id="modalName">
        <button id="saveModal">ZAPISZ</button>
        <button id="cancelModal" class="cancel-btn">ANULUJ</button>
    </div>
</div>

<div id="adminModal">
    <div class="modalContent">
        <h3 id="adminSeatInfo"></h3>
        <input type="password" id="adminPassword">
        <button id="adminConfirm" class="confirm-btn">USUŃ</button>
        <button id="adminCancel" class="cancel-btn">ANULUJ</button>
    </div>
</div>

<div id="adminListModal">
    <div class="modalContent">
        <h3>Panel admina</h3>
        <input type="password" id="adminListPassword">
        <div id="adminListContent"></div>
        <button id="adminListClose">ZAMKNIJ</button>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCgNJ5Ex6z0_aeqvwjDzwjTMQuTvqwdwVA",
  authDomain: "salarezerwacji.firebaseapp.com",
  databaseURL: "https://salarezerwacji-default-rtdb.firebaseio.com",
  projectId: "salarezerwacji",
  storageBucket: "salarezerwacji.firebasestorage.app",
  messagingSenderId: "64800282675",
  appId: "1:64800282675:web:a13faff668f5a9f2be6b46",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const hall = document.getElementById("hall");
let selectedSeats = [];
let drag = false;
document.addEventListener("mouseup", ()=>drag=false);

/* ===== SALA ===== */
for(let row=1; row<=20; row++){
    const rowDiv=document.createElement("div");
    rowDiv.classList.add("row");

    const label=document.createElement("div");
    label.classList.add("rowLabel");
    label.innerText=row;
    rowDiv.appendChild(label);

    let seats=row===1?26:(row===20?14:28);

    for(let i=1;i<=seats;i++){
        const id=`R${row}M${i}`;
        const b=document.createElement("button");
        b.className="seat";
        b.id=id;
        b.innerText=i;

        b.onmousedown=()=>{drag=true;toggle(b,id)};
        b.onmouseenter=()=>{if(drag)toggle(b,id)};

        rowDiv.appendChild(b);
    }

    hall.appendChild(rowDiv);
}

function toggle(btn,id){
    if(btn.classList.contains("occupied")) return;
    btn.classList.toggle("selected");
    selectedSeats = btn.classList.contains("selected")
        ? [...selectedSeats,id]
        : selectedSeats.filter(x=>x!=id);
}

/* ===== RESZTA ===== */

const ADMIN_PASSWORD="tajnehaslo";

document.getElementById("reserveBtn").onclick=()=>{
    if(!selectedSeats.length) return alert("Wybierz miejsca");
    document.getElementById("modal").style.display="flex";
};

document.getElementById("saveModal").onclick=()=>{
    const name=document.getElementById("modalName").value;

    selectedSeats.forEach(id=>{
        db.ref("seats/"+id).set({name});
        document.getElementById(id).classList.add("occupied");
    });

    selectedSeats=[];
    document.getElementById("modal").style.display="none";
};

db.ref("seats").on("value",snap=>{
    const data=snap.val()||{};
    document.querySelectorAll(".seat").forEach(b=>b.classList.remove("occupied"));

    Object.keys(data).forEach(id=>{
        const b=document.getElementById(id);
        if(b) b.classList.add("occupied");
    });
});

function searchPerson(){}

/* ADMIN */
hall.onclick=e=>{
    if(!e.target.classList.contains("occupied")) return;
    document.getElementById("adminModal").style.display="flex";
};

document.getElementById("adminCancel").onclick=()=>{
    document.getElementById("adminModal").style.display="none";
};

document.getElementById("adminConfirm").onclick=()=>{
    const pass=document.getElementById("adminPassword").value;
    if(pass!==ADMIN_PASSWORD) return alert("Błędne hasło");
};
</script>

</body>
</html>
